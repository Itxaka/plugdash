name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  packages: write # push to GHCR

jobs:
  images:
    name: Container images (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          # All platforms the distroless/static base image provides.
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/s390x
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binaries:
    name: Release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          # label = GOOS/GOARCH[/GOARM]; armv7 maps to GOARCH=arm GOARM=7.
          targets="
            linux/amd64 linux/arm64 linux/armv7 linux/386 linux/ppc64le linux/s390x linux/riscv64
            darwin/amd64 darwin/arm64
            windows/amd64 windows/arm64
            freebsd/amd64
          "
          for t in $targets; do
            os="${t%/*}"; label="${t#*/}"; arch="$label"; goarm=""
            if [ "$label" = "armv7" ]; then arch="arm"; goarm="7"; fi
            out="dist/plugdash_${VERSION}_${os}_${label}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" GOARM="$goarm" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out" ./cmd/plugdash
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
