<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>plugdash</title>
  <!-- Apply the saved theme and text size before first paint to avoid a flash.
       A ?theme=light|dark query param overrides and is persisted. -->
  <script>
    try {
      var q = new URLSearchParams(location.search).get("theme");
      var t = q || localStorage.getItem("plugdash:theme");
      if (t === "light" || t === "matrix") document.documentElement.dataset.theme = t;
      if (q) localStorage.setItem("plugdash:theme", q);
      var fs = localStorage.getItem("plugdash:fontscale");
      if (fs === "small" || fs === "large") document.documentElement.dataset.fontScale = fs;
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◈</span>
      <span>plugdash</span>
    </div>
    <div class="topbar-right">
      <nav class="nav" id="nav">
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="configure">Trackers</button>
        <button class="nav-btn" data-view="settings">Settings</button>
        <button class="nav-btn" data-view="logs">Logs</button>
      </nav>
      <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle light / dark theme">🌙</button>
    </div>
  </header>

  <main id="main" class="main"></main>

  <script src="/app.js"></script>
</body>
</html>
