# GoReleaser config — https://goreleaser.com
# Validate locally:  goreleaser check
# Dry-run a build:    goreleaser release --snapshot --clean --skip=publish
version: 2

project_name: plugdash

before:
  hooks:
    - go mod download

builds:
  - id: plugdash
    main: ./cmd/plugdash
    binary: plugdash
    env:
      - CGO_ENABLED=0 # pure-Go SQLite, fully static
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos: [linux, darwin, windows, freebsd]
    goarch: [amd64, arm64, arm, "386", ppc64le, s390x, riscv64]
    goarm: ["7"]
    ignore:
      # macOS only ships amd64 + arm64.
      - { goos: darwin, goarch: arm }
      - { goos: darwin, goarch: "386" }
      - { goos: darwin, goarch: ppc64le }
      - { goos: darwin, goarch: s390x }
      - { goos: darwin, goarch: riscv64 }
      # Windows: amd64 + arm64 only.
      - { goos: windows, goarch: "386" }
      - { goos: windows, goarch: arm }
      - { goos: windows, goarch: ppc64le }
      - { goos: windows, goarch: s390x }
      - { goos: windows, goarch: riscv64 }
      # FreeBSD: amd64 only.
      - { goos: freebsd, goarch: arm }
      - { goos: freebsd, goarch: arm64 }
      - { goos: freebsd, goarch: "386" }
      - { goos: freebsd, goarch: ppc64le }
      - { goos: freebsd, goarch: s390x }
      - { goos: freebsd, goarch: riscv64 }

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}
    files:
      - README.md
      - LICENSE*
      - docs/**/*

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  groups:
    - { title: Features, regexp: "^feat", order: 0 }
    - { title: Fixes, regexp: "^fix", order: 1 }
    - { title: Others, order: 999 }
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"

# Per-arch images, combined into one multi-arch tag by docker_manifests below.
dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.source=https://github.com/Itxaka/plugdash"
  - id: arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.source=https://github.com/Itxaka/plugdash"
  - id: armv7
    goos: linux
    goarch: arm
    goarm: "7"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-armv7"
    build_flag_templates:
      - "--platform=linux/arm/v7"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.source=https://github.com/Itxaka/plugdash"
  - id: ppc64le
    goos: linux
    goarch: ppc64le
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-ppc64le"
    build_flag_templates:
      - "--platform=linux/ppc64le"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.source=https://github.com/Itxaka/plugdash"
  - id: s390x
    goos: linux
    goarch: s390x
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-s390x"
    build_flag_templates:
      - "--platform=linux/s390x"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.source=https://github.com/Itxaka/plugdash"

docker_manifests:
  - name_template: "ghcr.io/itxaka/plugdash:{{ .Tag }}"
    image_templates: &arches
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-amd64"
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-arm64"
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-armv7"
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-ppc64le"
      - "ghcr.io/itxaka/plugdash:{{ .Tag }}-s390x"
  - name_template: "ghcr.io/itxaka/plugdash:v{{ .Major }}.{{ .Minor }}"
    image_templates: *arches
  - name_template: "ghcr.io/itxaka/plugdash:latest"
    image_templates: *arches

release:
  github:
    owner: Itxaka
    name: plugdash
  draft: false
  prerelease: auto
